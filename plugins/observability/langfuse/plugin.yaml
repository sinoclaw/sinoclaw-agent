name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Hermes — traces conversations, LLM calls, and tool usage. Opt-in via `sinoclaw plugins enable observability/langfuse` or `sinoclaw tools → Langfuse Observability`."
author: Sinoclaw Team
requires_env:
  - SINOCLAW_LANGFUSE_PUBLIC_KEY
  - SINOCLAW_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
